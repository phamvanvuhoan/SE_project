restaurant.security.jwt.secret=${JWT_SECRET:change-this-development-secret-32-bytes-minimum}
restaurant.security.jwt.expiration=8h

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/restaurant_pos}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
